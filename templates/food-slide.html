  :root {
    --paper: #F4E7CC;
    --paper-deep: #E7D2A2;
    --cream-white: #FBF3E4;
    --ink: #33190E;
    --ink-soft: #7C6650;
    --red: #E2402A;
    --amber: #D98A3D;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .slide { width: 1080px; height: 1350px; position: relative; overflow: hidden; background: var(--paper); }

  .eyebrow { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; color: var(--ink-soft); }
  .eyebrow .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }

  /* ---------- cover ---------- */
  .cover-photo { position: absolute; inset: 0; background-size: cover; background-position: center; }
  .cover-scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(31, 15, 8, 0) 0%,
      rgba(31, 15, 8, 0) 44%,
      rgba(31, 15, 8, 0.46) 66%,
      rgba(31, 15, 8, 0.82) 86%,
      rgba(31, 15, 8, 0.94) 100%);
  }
  .cover-content {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 0 72px 58px;
    display: flex; flex-direction: column; gap: 22px;
  }
  .cover-tag {
    display: flex; align-items: center; gap: 11px;
    font-weight: 700; font-size: 20px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--cream-white);
  }
  .cover-tag .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .cover-headline {
    font-family: 'Fraunces'; font-optical-sizing: auto; font-weight: 620;
    font-size: 60px; line-height: 1.12; color: var(--cream-white);
    text-shadow: 0 4px 20px rgba(15, 7, 3, 0.4);
  }
  .cover-foot { display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 21px; color: rgba(251,243,228,0.82); letter-spacing: 0.3px; }

  /* ---------- shared body chrome ---------- */
  .body-slide { padding: 90px 84px 64px; display: flex; flex-direction: column; height: 100%; }
  .body-main { flex: 1; display: flex; flex-direction: column; justify-content: center; margin-top: 56px; }
  .footer-rule { height: 2px; background: var(--paper-deep); margin-top: auto; }
  .footer-row { display: flex; align-items: center; justify-content: space-between; padding-top: 26px; font-weight: 700; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-soft); }
  .footer-row .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); margin-right: 10px; display: inline-block; vertical-align: middle; }
  .source-line { font-weight: 500; font-size: 19px; line-height: 1.5; color: var(--ink-soft); font-style: italic; padding-bottom: 28px; }

  /* ---------- trivia ---------- */
  .fact-text {
    font-family: 'Fraunces'; font-optical-sizing: auto; font-weight: 560;
    font-size: 56px; line-height: 1.24; color: var(--ink);
    max-width: 880px;
  }

  /* ---------- recipe ---------- */
  .recipe-title { font-family: 'Fraunces'; font-optical-sizing: auto; font-weight: 620; font-size: 48px; line-height: 1.12; color: var(--ink); margin-bottom: 18px; }
  .recipe-meta { font-weight: 600; font-size: 21px; color: var(--ink-soft); letter-spacing: 0.3px; display: flex; gap: 12px; align-items: center; margin-bottom: 30px; }
  .recipe-meta .sep { color: var(--amber); }
  .health-label { font-weight: 700; font-size: 17px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--amber); margin-bottom: 10px; }
  .health-note { font-family: 'Fraunces'; font-optical-sizing: auto; font-style: italic; font-weight: 400; font-size: 24px; line-height: 1.5; color: var(--ink-soft); margin-bottom: 36px; }
  .section-label { font-weight: 700; font-size: 19px; letter-spacing: 3px; text-transform: uppercase; color: var(--red); margin-bottom: 18px; }
  .ingredients-list { list-style: none; }
  .ingredients-list li { font-weight: 500; font-size: 26px; color: var(--ink); padding: 14px 0; border-bottom: 1px solid var(--paper-deep); }
  .ingredients-list.compact li { font-size: 22px; padding: 10px 0; }
  .steps-list { list-style: none; }
  .steps-list li { font-weight: 500; font-size: 25px; line-height: 1.48; color: var(--ink); padding: 20px 0 20px 60px; position: relative; border-bottom: 1px solid var(--paper-deep); }
  .step-num { position: absolute; left: 0; top: 18px; font-family: 'Fraunces'; font-optical-sizing: auto; font-weight: 600; font-size: 30px; color: var(--red); }
  .method-label { font-weight: 700; font-size: 19px; letter-spacing: 3px; text-transform: uppercase; color: var(--red); margin-top: 40px; }
</style>
</head>
