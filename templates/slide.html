  :root {
    --bg: #d9d9d9;
    --ink: #1a1e2e;
    --ink-deep: #0d0f1a;
    --white: #ffffff;
    --muted: #5b6072;
    --muted-on-dark: rgba(255, 255, 255, 0.68);
    --ring: rgba(13, 15, 26, 0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; }
  body {
    font-family: "Poppins", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
  }

  /* ---------- Cover slide ---------- */
  .cover {
    position: relative;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .cover .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(13, 15, 26, 0.12) 0%,
      rgba(13, 15, 26, 0.05) 38%,
      rgba(13, 15, 26, 0.86) 80%,
      rgba(13, 15, 26, 0.97) 100%);
  }
  .cover .content {
    position: relative;
    padding: 72px 72px 96px;
  }
  .kicker {
    display: inline-flex;
    align-items: center;
    font-size: 24px; font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--white);
    background: var(--ink);
    border: 1.5px solid rgba(255, 255, 255, 0.55);
    padding: 10px 22px; border-radius: 8px;
    margin-bottom: 36px;
  }
  .headline {
    font-size: 76px; font-weight: 800; line-height: 1.14;
    letter-spacing: -1px;
    color: var(--white);
    text-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    text-wrap: balance;
  }
  .cover .handle {
    margin-top: 44px;
    font-size: 26px; font-weight: 600; letter-spacing: 0.3px;
    color: var(--muted-on-dark);
  }

  /* ---------- Extra full-bleed photo slide ---------- */
  .photo-slide .scrim {
    background: linear-gradient(180deg,
      rgba(13, 15, 26, 0) 52%,
      rgba(13, 15, 26, 0.55) 78%,
      rgba(13, 15, 26, 0.88) 100%);
  }
  .photo-slide .content { padding: 72px; }
  .photo-relation {
    font-size: 32px; font-weight: 700; line-height: 1.32;
    color: var(--white);
    text-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
    margin-bottom: 16px;
    text-wrap: balance;
  }
  .photo-credit {
    font-size: 24px; font-weight: 600; letter-spacing: 0.3px;
    color: var(--muted-on-dark);
  }

  /* ---------- Body slide ---------- */
  .body-slide {
    position: relative;
    width: 100%; height: 100%;
    padding: 64px 56px 56px;
    display: flex; flex-direction: column;
    background:
      radial-gradient(900px 560px at 8% 106%, rgba(26, 30, 46, 0.06), transparent 60%),
      radial-gradient(760px 520px at 104% -6%, rgba(26, 30, 46, 0.05), transparent 55%),
      var(--bg);
    overflow: hidden;
  }
  .body-slide .ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid var(--ring);
  }
  .body-slide .ring-outer { width: 620px; height: 620px; right: -220px; top: -220px; }
  .body-slide .ring-inner { width: 420px; height: 420px; right: -120px; top: -120px; }
  .body-slide .ring-bl { width: 360px; height: 360px; left: -160px; bottom: -160px; }

  .card {
    position: relative;
    flex: 1;
    background: var(--white);
    border-radius: 44px;
    padding: 60px 64px 64px;
    display: flex; flex-direction: column;
    box-shadow:
      0 2px 6px rgba(13, 15, 26, 0.05),
      0 30px 60px rgba(13, 15, 26, 0.16);
    border: 1px solid rgba(13, 15, 26, 0.05);
    overflow: hidden;
  }
  .top-row {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card .kicker {
    font-size: 19px; padding: 8px 16px; margin-bottom: 0;
    letter-spacing: 2.5px; border-radius: 7px;
  }
  /* Decorative geometry — replaced the old slide counter/ghost numeral.
     Two tiers: a large faint "hero" shape for depth, and a smaller mark that
     actually registers (unlike the near-invisible marks in the first pass). */
  .accent {
    position: absolute; z-index: 0;
    color: var(--ink-deep);
    pointer-events: none;
  }
  .accent svg { display: block; }
  .accent-hero { opacity: 0.10; }
  .accent-mark { opacity: 0.55; }
  .hero-br { right: -104px; bottom: -104px; }
  .hero-cr { right: -84px; top: 250px; }
  .hero-tl { left: -108px; top: -108px; }
  .mark-tr { top: 54px; right: 60px; }

  .body-text-wrap {
    position: relative; z-index: 1;
    flex: 1;
    display: flex;
  }
  /* Text block anchors at a different height per variant, so consecutive
     slides read as structurally different, not just differently decorated. */
  /* Top-anchored: pad the top so the lead bar isn't cramped against the
     kicker chip. Center/bottom variants keep the lead bar away from it. */
  .v1 .body-text-wrap { align-items: flex-start; padding-top: 60px; }
  .v2 .body-text-wrap { align-items: center; }
  .v3 .body-text-wrap { align-items: flex-end; }

  .body-text {
    font-size: 52px; font-weight: 600; line-height: 1.38;
    color: var(--ink);
  }
  /* Pronounced solid lead bar above the text — a bold brand mark, sized per
     variant. Moves with the text so it reads correctly at any anchor height. */
  .body-text::before {
    content: ""; display: block;
    height: 8px; border-radius: 4px;
    background: var(--ink-deep);
  }
  .v1 .body-text::before { width: 104px; margin-bottom: 34px; }
  .v2 .body-text::before { width: 64px; margin-bottom: 28px; }
  .v3 .body-text::before { width: 140px; margin-bottom: 34px; }
  .source {
    position: relative; z-index: 1;
    margin-top: 30px;
    font-size: 25px; color: var(--muted); line-height: 1.48;
    /* Opaque (not translucent) so background geometry can never show through
       it — the earlier translucent fill let accent lines bleed over the text. */
    background: #e9ebf1;
    border-left: 5px solid var(--ink-deep);
    border-radius: 4px 14px 14px 4px;
    padding: 20px 26px;
  }
  .footer {
    margin-top: 36px;
    display: flex; align-items: center; justify-content: center; gap: 18px;
  }
  .footer span {
    font-size: 25px; font-weight: 700; color: var(--ink);
    background: var(--white);
    padding: 14px 30px; border-radius: 999px;
    box-shadow: 0 10px 26px rgba(13, 15, 26, 0.10);
    letter-spacing: 0.3px;
  }
  .footer-logo {
    width: 77px; height: 77px;
    display: block;
    filter: drop-shadow(0 8px 18px rgba(13, 15, 26, 0.16));
  }
</style>
</head>
