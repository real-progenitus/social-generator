<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0d0221;
    --panel: #160a33;
    --accent: #b9ff2e;
    --accent-2: #2ee6ff;
    --text: #f2eefc;
    --muted: #9d92c4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; }
  body {
    font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ---------- Cover slide ---------- */
  .cover {
    position: relative;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .cover .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(13, 2, 33, 0.15) 0%,
      rgba(13, 2, 33, 0.05) 40%,
      rgba(13, 2, 33, 0.88) 82%,
      rgba(13, 2, 33, 0.97) 100%);
  }
  .cover .content {
    position: relative;
    padding: 72px 72px 96px;
  }
  .kicker {
    display: inline-block;
    font-size: 26px; font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase;
    color: #0d0221;
    background: var(--accent);
    padding: 10px 22px; border-radius: 6px;
    margin-bottom: 36px;
  }
  .headline {
    font-size: 76px; font-weight: 800; line-height: 1.12;
    letter-spacing: -1px;
    text-wrap: balance;
  }
  .cover .handle {
    margin-top: 44px;
    font-size: 28px; font-weight: 600; color: var(--muted);
  }

  /* ---------- Body slide ---------- */
  .body-slide {
    width: 100%; height: 100%;
    padding: 96px 84px 84px;
    display: flex; flex-direction: column;
    background:
      radial-gradient(1200px 700px at 110% -10%, rgba(46, 230, 255, 0.12), transparent 60%),
      radial-gradient(1000px 800px at -20% 115%, rgba(185, 255, 46, 0.10), transparent 55%),
      var(--bg);
  }
  .slide-num {
    font-size: 30px; font-weight: 800; color: var(--accent);
    letter-spacing: 3px; margin-bottom: 56px;
  }
  .slide-num .total { color: var(--muted); font-weight: 600; }
  .body-text {
    font-size: 52px; font-weight: 600; line-height: 1.38;
    flex: 1;
  }
  .source {
    font-size: 28px; color: var(--muted); line-height: 1.4;
    border-left: 6px solid var(--accent-2);
    padding-left: 24px;
    margin-bottom: 48px;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 28px; font-weight: 600; color: var(--muted);
  }
  .dots { display: flex; gap: 12px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #3a2e63; }
  .dot.active { background: var(--accent); }
</style>
</head>
<body>
<!--SLIDE_CONTENT-->
</body>
</html>
